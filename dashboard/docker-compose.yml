services:
  benchmark-dashboard:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8088}:8088"
    environment:
      DASHBOARD_CORS_ORIGINS: ${DASHBOARD_CORS_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088}
      BENCHMARK_JSON_STORE: ${BENCHMARK_JSON_STORE:-/data/benchmark-results.json}
      DASHBOARD_ARTIFACT_ROOT: ${DASHBOARD_ARTIFACT_ROOT:-/artifacts}
      DASHBOARD_DATABASE_URL: ${DASHBOARD_DATABASE_URL:-}
    volumes:
      - ../benchmark/results:/data:ro
      - ../benchmark/artifacts:/artifacts:ro

networks:
  default:
    name: lanta-llm-platform
