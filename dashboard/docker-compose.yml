services:
  benchmark-dashboard:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8088}:8088"
    environment:
      DASHBOARD_CORS_ORIGINS: ${DASHBOARD_CORS_ORIGINS:-http://127.0.0.1:8088,http://localhost:8088}
      BENCHMARK_JSON_STORE: ${BENCHMARK_JSON_STORE:-/data/benchmark-results.json}
      DASHBOARD_ARTIFACT_ROOT: ${DASHBOARD_ARTIFACT_ROOT:-/artifacts}
      DASHBOARD_DATABASE_URL: ${DASHBOARD_DATABASE_URL:-}
      DASHBOARD_HEALTH_TIMEOUT_SECONDS: ${DASHBOARD_HEALTH_TIMEOUT_SECONDS:-3}
      LITELLM_ACTIVE_MODEL: ${LITELLM_ACTIVE_MODEL:-active-lanta-model}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-http://litellm:4000}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      OPENWEBUI_BASE_URL: ${OPENWEBUI_BASE_URL:-http://openwebui:8080}
      PLATFORM_EXPORTER_BASE_URL: ${PLATFORM_EXPORTER_BASE_URL:-http://platform-exporter:9108}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://prometheus:9090}
      GRAFANA_BASE_URL: ${GRAFANA_BASE_URL:-http://grafana:3000}
      GRAFANA_PUBLIC_URL: ${GRAFANA_PUBLIC_URL:-http://127.0.0.1:3002}
      OPENWEBUI_PUBLIC_URL: ${OPENWEBUI_PUBLIC_URL:-http://127.0.0.1:3000}
      PROMETHEUS_PUBLIC_URL: ${PROMETHEUS_PUBLIC_URL:-http://127.0.0.1:9090}
      LITELLM_PUBLIC_URL: ${LITELLM_PUBLIC_URL:-http://127.0.0.1:4000/v1}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-http://127.0.0.1:8088}
      KEY_MANAGEMENT_DOCS_URL: ${KEY_MANAGEMENT_DOCS_URL:-https://github.com/ArmmyC/Lanta-LLM-Hosting/blob/main/docs/KEY_MANAGEMENT.md}
      OPERATIONS_DOCS_URL: ${OPERATIONS_DOCS_URL:-https://github.com/ArmmyC/Lanta-LLM-Hosting/blob/main/docs/OPERATIONS.md}
      LITELLM_MODELS_DOCS_URL: ${LITELLM_MODELS_DOCS_URL:-https://github.com/ArmmyC/Lanta-LLM-Hosting/blob/main/litellm/README.md}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
    volumes:
      - ../benchmark/results:/data:ro
      - ../benchmark/artifacts:/artifacts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: lanta-llm-platform
